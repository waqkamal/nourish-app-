<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="description" content="Nourish – Track your daily meals, macros and calories" />

    <!-- PWA / iOS specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nourish" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Apple touch icons (iOS uses these, not manifest icons) -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="72x72"  href="%PUBLIC_URL%/icons/icon-72.png" />
    <link rel="apple-touch-icon" sizes="96x96"  href="%PUBLIC_URL%/icons/icon-96.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="%PUBLIC_URL%/icons/icon-128.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="%PUBLIC_URL%/icons/icon-144.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="%PUBLIC_URL%/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="%PUBLIC_URL%/icons/icon-512.png" />

    <!-- Apple splash screens for clean launch -->
    <meta name="apple-touch-startup-image" content="%PUBLIC_URL%/icons/icon-512.png" />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="icon" href="%PUBLIC_URL%/icons/icon-192.png" />

    <title>Nourish</title>

    <style>
      /* Prevent flash of unstyled content */
      body { margin: 0; background: #f8f0ff; }
      /* Safe area insets for iPhone notch / Dynamic Island */
      #root {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Nourish.</noscript>
    <div id="root"></div>
  </body>
</html>
